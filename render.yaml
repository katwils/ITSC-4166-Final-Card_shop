services:
  - type: web
    name: cardboard-kingdom-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cardboard-kingdom-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: cardboard-kingdom-db
    plan: free